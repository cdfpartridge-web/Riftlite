# Runs the short-lived Find Match voice/listing cleanup outside Vercel Cron.
# Vercel Hobby only allows daily cron schedules, so this keeps 5-minute
# cleanup behavior without blocking production deploys.

name: Cleanup LFG listings

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: lfg-cleanup
  cancel-in-progress: true

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Hit cleanup endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          COMMUNITY_AGGREGATE_SECRET: ${{ secrets.COMMUNITY_AGGREGATE_SECRET }}
        run: |
          CLEANUP_SECRET="${CRON_SECRET:-$COMMUNITY_AGGREGATE_SECRET}"
          if [ -z "$CLEANUP_SECRET" ]; then
            echo "::error::Set CRON_SECRET or COMMUNITY_AGGREGATE_SECRET in repo secrets for LFG cleanup"
            exit 1
          fi

          response_file="$(mktemp)"
          http_code="$(curl \
            --silent \
            --show-error \
            --max-time 45 \
            -X POST \
            -H "Authorization: Bearer $CLEANUP_SECRET" \
            -o "$response_file" \
            -w "%{http_code}" \
            "https://riftlite.vercel.app/api/lfg/cleanup")"

          echo "HTTP $http_code"
          cat "$response_file"
          echo

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "::error::LFG cleanup endpoint returned HTTP $http_code"
            exit 1
          fi
