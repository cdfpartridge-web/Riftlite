# Cron that refreshes the community aggregate Firestore docs.
#
# Why GitHub Actions instead of Vercel Cron: the Hobby Vercel plan only
# allows a single daily cron, and keeping this job here lets us manually
# repair/prime the aggregate without changing site code.
#
# What the webhook does: reads COMMUNITY_WINDOW_SIZE public matches from
# Firestore, writes the normalized latest window into chunked aggregate
# docs, refreshes range docs, and invalidates the `community-matches`
# cache tag. Desktop appends handle normal freshness; this is the repair
# safety net so hot page loads do not scan raw matches.
#
# See: src/app/api/community/aggregate/refresh/route.ts
#      src/lib/community/data.ts

name: Refresh community aggregate

on:
  schedule:
    # Daily. This is the SAFETY NET, not the fast path.
    # The desktop client triggers /api/community/aggregate/append after
    # each match save for near-instant freshness; this cron only exists
    # to catch edits, deletions, and anything the append path missed.
    # 1 run/day reads the latest 7,000 public matches. The 7/14/30 day
    # range caches use a one-time raw backfill, then daily chunk-level
    # merge/prune repair so they do not triple the daily read cost.
    - cron: "17 3 * * *"
  # Manual trigger so we can prime the aggregate doc on first deploy
  # and recover quickly if something gets wedged.
  workflow_dispatch:

concurrency:
  # If a previous run is still going, skip this one instead of piling up.
  group: refresh-community-aggregate
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Hit refresh webhook
        env:
          REFRESH_SECRET: ${{ secrets.COMMUNITY_AGGREGATE_SECRET }}
        run: |
          if [ -z "$REFRESH_SECRET" ]; then
            echo "::error::COMMUNITY_AGGREGATE_SECRET is not set in repo secrets"
            exit 1
          fi

          # --fail makes curl exit non-zero on 4xx/5xx so the job turns red.
          # --show-error + --silent keeps the log clean on success but still
          # prints errors. -w dumps the HTTP status for easy scanning.
          response=$(curl \
            --fail \
            --silent \
            --show-error \
            --max-time 60 \
            -X POST \
            -H "Authorization: Bearer $REFRESH_SECRET" \
            -w "\nHTTP %{http_code} in %{time_total}s\n" \
            "https://riftlite.vercel.app/api/community/aggregate/refresh")

          echo "$response"
